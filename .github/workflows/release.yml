name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  rspec:
    name: RSpec (${{ matrix.os }}, Ruby ${{ matrix.ruby }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
        ruby:
          - '3.2'
          - '3.3'
          - '3.4'
          - '4.0'

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true

      - name: Run RSpec
        run: bundle exec rspec

  rubocop:
    name: RuboCop
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true

      - name: Run RuboCop
        run: bundle exec rubocop --parallel

  gem-build:
    name: Gem Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true

      - name: Build gem
        run: bundle exec gem build veltrunode.gemspec

      - name: Upload gem artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-gem
          path: veltrunode-*.gem

  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    needs:
      - rspec
      - rubocop
      - gem-build

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Confirm CI verification jobs passed
        run: echo 'All release verification jobs passed.'

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true

      - name: Download gem artifact
        uses: actions/download-artifact@v4
        with:
          name: release-gem
          path: pkg

      - name: Prepare release notes from CHANGELOG
        id: release_notes
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          ruby <<'RUBY'
          tag = ENV.fetch('RELEASE_TAG')
          changelog = File.read('CHANGELOG.md')
            pattern = /^## #{Regexp.escape(tag)}[^\n]*\n(?<body>.*?)(?=^## |\z)/m
          match = changelog.match(pattern)

          notes = if match
                    match[:body].strip
                  else
                    "- No CHANGELOG entry found for #{tag}."
                  end

          File.write('release_notes.md', notes + "\n")
          RUBY

      - name: Configure GitHub Packages credentials
        env:
          GITHUB_PACKAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -z "${GITHUB_PACKAGES_TOKEN}" ]; then
            echo 'GITHUB_TOKEN is not available for GitHub Packages publishing.' >&2
            exit 1
          fi
          mkdir -p "$HOME/.gem"
          cat > "$HOME/.gem/credentials" <<EOF
          ---
          :github: Bearer ${GITHUB_PACKAGES_TOKEN}
          EOF
          chmod 0600 "$HOME/.gem/credentials"

      - name: Push gem to GitHub Packages
        run: gem push --key github --host https://rubygems.pkg.github.com/${{ github.repository_owner }} pkg/*.gem

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: release_notes.md
          files: pkg/*.gem