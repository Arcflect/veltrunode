name: Bump Version PR

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Type of version bump (patch, minor, major)'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: false

      - name: Calculate and update version
        id: bump_version
        env:
          BUMP_TYPE: ${{ github.event.inputs.bump_type }}
        run: |
          ruby -e '
            version_file = "lib/veltrunode/version.rb"
            content = File.read(version_file)
            version = content.match(/VERSION = \x27([^\x27]+)\x27/)[1]
            
            major, minor, patch = version.split(".").map(&:to_i)
            case ENV["BUMP_TYPE"]
            when "major"
              major += 1
              minor = 0
              patch = 0
            when "minor"
              minor += 1
              patch = 0
            else
              patch += 1
            end
            
            new_version = "#{major}.#{minor}.#{patch}"
            new_content = content.sub(/VERSION = \x27[^\x27]+\x27/, "VERSION = \x27#{new_version}\x27")
            File.write(version_file, new_content)
            
            File.open(ENV["GITHUB_OUTPUT"], "a") { |f| f.puts "new_version=#{new_version}" }
            puts "Bumped version from #{version} to #{new_version}"
          '

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: bump version to v${{ steps.bump_version.outputs.new_version }}"
          branch: "bump-version/v${{ steps.bump_version.outputs.new_version }}"
          title: "bump: version to v${{ steps.bump_version.outputs.new_version }}"
          body: |
            This PR bumps the project version to `v${{ steps.bump_version.outputs.new_version }}` based on manual workflow dispatch trigger.
            
            Please review and approve this PR to merge the version bump into `main`. Once merged, the release workflow will automatically trigger to publish the new release.
          labels: "chore"
