name: Release Workflow

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: false

      - name: Check trigger type and run release actions
        id: release_check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMIT_SHA: ${{ github.sha }}
          REPOSITORY: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          ruby -e '
            require "json"

            if ENV["EVENT_NAME"] != "push"
              # It is a PR event, just run release-drafter draft update
              File.open(ENV["GITHUB_OUTPUT"], "a") do |f|
                f.puts "action_type=draft"
                f.puts "publish=false"
              end
              exit 0
            end

            # Query the PR associated with the merge commit
            commit_sha = ENV["COMMIT_SHA"]
            repository = ENV["REPOSITORY"]
            pr_json = `gh api repos/#{repository}/commits/#{commit_sha}/pulls`
            pr_data = JSON.parse(pr_json).first

            if pr_data.nil?
              # Not merged from PR (e.g. direct push to main), just draft
              File.open(ENV["GITHUB_OUTPUT"], "a") do |f|
                f.puts "action_type=draft"
                f.puts "publish=false"
              end
              exit 0
            end

            title = pr_data["title"]
            labels = pr_data["labels"].map { |l| l["name"] }

            if title.start_with?("bump: version to")
              # Version bump PR has been merged. Keep the release draft updated;
              # the actual publish now happens from the tag-triggered release workflow.
              version_file = "lib/veltrunode/version.rb"
              content = File.read(version_file)
              version = content.match(/VERSION = \x27([^\x27]+)\x27/)[1]

              File.open(ENV["GITHUB_OUTPUT"], "a") do |f|
                f.puts "action_type=draft"
                f.puts "publish=false"
                f.puts "version=#{version}"
              end
              puts "Version bump PR merged. Update the draft release and push tag v#{version} to publish packages."
            else
              # Normal code PR has been merged! Create a version-bump PR!
              bump_type = "patch"
              if labels.include?("major")
                bump_type = "major"
              elsif labels.include?("minor")
                bump_type = "minor"
              end

              version_file = "lib/veltrunode/version.rb"
              content = File.read(version_file)
              version = content.match(/VERSION = \x27([^\x27]+)\x27/)[1]

              major, minor, patch = version.split(".").map(&:to_i)
              case bump_type
              when "major"
                major += 1
                minor = 0
                patch = 0
              when "minor"
                minor += 1
                patch = 0
              else
                patch += 1
              end

              new_version = "#{major}.#{minor}.#{patch}"
              new_content = content.sub(/VERSION = \x27[^\x27]+\x27/, "VERSION = \x27#{new_version}\x27")
              File.write(version_file, new_content)

              changelog_file = "CHANGELOG.md"
              if File.exist?(changelog_file)
                changelog_content = File.read(changelog_file)
                release_date = Time.now.utc.strftime("%Y-%m-%d")
                unreleased_pattern = /## Unreleased\s*\n(?<body>.*?)(?=\n## |\z)/m
                match = changelog_content.match(unreleased_pattern)

                if match
                  unreleased_body = match[:body].strip
                  unreleased_body = "- _No changes yet._" if unreleased_body.empty?
                  replacement = <<~MARKDOWN
                    ## Unreleased

                    - _No changes yet._

                    ## v#{new_version} - #{release_date}

                    #{unreleased_body}
                  MARKDOWN
                  changelog_content = changelog_content.sub(unreleased_pattern, replacement)
                else
                  appendix = <<~MARKDOWN

                    ## Unreleased

                    - _No changes yet._

                    ## v#{new_version} - #{release_date}

                    - Bump version to v#{new_version}.
                  MARKDOWN
                  changelog_content = "#{changelog_content.rstrip}\n#{appendix}"
                end

                File.write(changelog_file, changelog_content)
              end

              File.open(ENV["GITHUB_OUTPUT"], "a") do |f|
                f.puts "action_type=bump"
                f.puts "publish=false"
                f.puts "new_version=#{new_version}"
              end
              puts "Code PR merged. Creating version bump PR to v#{new_version} (type: #{bump_type})."
            end
          '

      - name: Create Pull Request for Version Bump
        if: steps.release_check.outputs.action_type == 'bump'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          author: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          committer: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          commit-message: "chore: bump version to v${{ steps.release_check.outputs.new_version }} and update changelog"
          branch: "bump-version/v${{ steps.release_check.outputs.new_version }}"
          title: "bump: version to v${{ steps.release_check.outputs.new_version }}"
          body: |
            This PR bumps the project version to `v${{ steps.release_check.outputs.new_version }}` and updates `CHANGELOG.md` based on the merged Pull Request labels.
            
            Please review and approve this PR to merge the version bump into `main`. After merge, this workflow will automatically push the matching `v${{ steps.release_check.outputs.new_version }}` tag to trigger the publish workflow.
          labels: "chore"

      - name: Push release tag
        if: steps.release_check.outputs.action_type == 'draft' && steps.release_check.outputs.version != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.release_check.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          if git ls-remote --tags origin "v${VERSION}" | grep -q "refs/tags/v${VERSION}$"; then
            echo "Tag v${VERSION} already exists on origin; skipping."
            exit 0
          fi
          git tag -a "v${VERSION}" -m "Release v${VERSION}"
          git push origin "v${VERSION}"

      - name: Update Release Drafter draft
        uses: release-drafter/release-drafter@v7
        with:
          config-name: release-drafter-config.yml
          publish: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
